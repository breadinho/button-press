<!DOCTYPE html>
<html>
<head>
    <title>BUTTON PRESS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔘 BUTTON PRESS</h1>

<h2>Clicks: <span id="clicks">0</span></h2>

<button id="mainButton">
    CLICK
</button>


<div class="shop">

    <h2>🛒 Shop</h2>

    <div class="item">
        <h3>⚙️ Clicker</h3>
        <p>+1 click per second</p>
        <p>Price: <span id="clickerPrice">10</span> clicks</p>
        <button id="buyClicker">
            Buy Clicker
        </button>
        <p>Owned: <span id="clickers">0</span></p>
    </div>


    <div class="item">
        <h3>✋ Hand</h3>
        <p>+2 clicks per press</p>
        <p>Price: <span id="handPrice">50</span> clicks</p>
        <button id="buyHand">
            Buy Hand
        </button>
        <p>Owned: <span id="hands">0</span></p>
    </div>

</div>


<script src="script.js"></script>

</body>
</html>
<div class="item">

    <h3>🗿 MOAI</h3>

    <p>+10 clicks per second</p>

    <p>
        Price:
        <span id="moaiPrice">1000</span>
        clicks
    </p>

    <button id="buyMoai">
        Buy MOAI
    </button>

    <p>
        Owned:
        <span id="moais">0</span>
    </p>

</div>
